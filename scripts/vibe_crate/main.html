<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Crates</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css" />
<style>
  .site-title {
    font-weight: 800;
    font-size: clamp(2.4rem, 7vw, 3.8rem);
    text-align: center;
    margin: clamp(2rem, 6vw, 3.5rem) 0 0;
  }

  .home-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 clamp(1rem, 4vw, 2rem) clamp(3rem, 6vw, 5rem);
  }

  .section {
    margin-top: clamp(2rem, 5vw, 3rem);
  }
  .section h2 {
    font-family: var(--font-label);
    font-size: .85rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 1rem;
  }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.4rem;
  }
  @media (max-width: 820px) {
    .board-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .board-tile {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .board-tile .canvas {
    aspect-ratio: 1 / 1;
    background: #fafafa;
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .board-tile:hover .canvas {
    transform: translateY(-3px);
    box-shadow: 0 12px 20px rgba(0,0,0,.24);
  }
  .board-tile .tile-caption {
    margin-top: .5rem;
    font-family: var(--font-label);
    font-weight: 700;
    font-size: .82rem;
    line-height: 1.3;
    text-align: center;
  }
</style>
</head>
<body>

<h1 class="site-title">Crates</h1>

<form class="searchbar-row" id="searchForm">
  <div class="searchbar">
    <input type="text" id="searchInput" placeholder="create your own collection via searching" />
    <button type="submit" aria-label="검색">→</button>
  </div>
</form>

<div class="home-wrap">
  <div class="section">
    <h2>오늘의 추천 보드</h2>
    <div class="board-grid" id="grid-recommended"></div>
  </div>
  <div class="section">
    <h2>내 보드</h2>
    <div class="board-grid" id="grid-mine"></div>
  </div>
  <div class="section">
    <h2>인기 보드</h2>
    <div class="board-grid" id="grid-popular"></div>
  </div>
</div>

<script src="boards.js"></script>
<script src="common.js"></script>
<script>
  function renderTile(board) {
    var a = document.createElement("a");
    a.className = "board-tile";
    a.href = "board.html?id=" + encodeURIComponent(board.id);

    var canvasEl = document.createElement("div");
    canvasEl.className = "canvas";
    a.appendChild(canvasEl);
    renderBoardCanvas(canvasEl, board.items, { interactive: false });

    var caption = document.createElement("p");
    caption.className = "tile-caption";
    caption.textContent = board.title;
    a.appendChild(caption);

    return a;
  }

  function renderSection(gridId, boards) {
    var grid = document.getElementById(gridId);
    boards.forEach(function (b) { grid.appendChild(renderTile(b)); });
  }

  var all = (window.BOARDS || []).slice();
  var customMine = getAllCustomBoards();

  renderSection("grid-recommended", all.filter(function (b) { return b.section === "recommended"; }));
  renderSection("grid-mine", all.filter(function (b) { return b.section === "mine"; }).concat(customMine));
  renderSection("grid-popular", all.filter(function (b) { return b.section === "popular"; }));

  // 검색창: 새 검색어로 보드를 즉석 생성 (데모용 — 실제 추천 API 연동 전까지는
  // 기존 아이템 풀을 무작위로 섞어 보여줌) 후 그 보드 페이지로 이동
  document.getElementById("searchForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var q = document.getElementById("searchInput").value.trim();
    if (!q) return;
    var pool = (window.BOARDS && window.BOARDS[0] && window.BOARDS[0].items) || [];
    var board = createBoardFromQuery(q, pool);
    saveCustomBoard(board);
    location.href = "board.html?id=" + encodeURIComponent(board.id);
  });
</script>
</body>
</html>
