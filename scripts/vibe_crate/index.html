<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>이게 당신의 Vibe라면</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /*
    이 파일은 정적 레이아웃 소스다. 데이터(추천 아이템 배열)는 data.js에서
    RECOMMENDATIONS 전역 변수로 주입되고, 이 파일의 <script>가 그걸 읽어
    SLOTS(고정 8존 배치)에 순서대로 채워 넣는다.
    아이템 개수가 SLOTS보다 많으면 순환(cycle), 적으면 남는 슬롯은 비움.
  */

  :root {
    --tag-movie: #3b4cca;
    --tag-music: #c9871f;
    --tag-book:  #1f7a5c;

    --font-display: "Arial Rounded MT Bold", "SF Pro Rounded", "Helvetica Rounded", "Segoe UI", Arial, sans-serif;
    --font-script: "Bradley Hand", "Segoe Print", "Snell Roundhand", cursive;
    --font-label: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #ffffff;
    color: #0d0d0d;
    font-family: var(--font-display);
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: clamp(2rem, 6vw, 4rem) clamp(1rem, 4vw, 2rem) clamp(2.5rem, 6vw, 4rem);
  }

  h1.headline {
    font-weight: 800;
    font-size: clamp(2.1rem, 7vw, 3.4rem);
    line-height: 1.05;
    text-align: center;
    text-wrap: balance;
    margin: 0 0 .5rem;
  }

  .script-sub {
    display: block;
    text-align: center;
    font-family: var(--font-script);
    font-style: italic;
    font-size: clamp(1.4rem, 4vw, 2rem);
    margin: 0 0 clamp(2rem, 5vw, 3rem);
  }

  .canvas {
    position: relative;
    width: 100%;
    aspect-ratio: 20 / 21;
  }

  .obj-slot {
    position: absolute;
    margin: 0;
    transform: rotate(var(--rot, 0deg));
  }

  .obj-slot .frame {
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 16px rgba(0,0,0,.32);
  }

  .obj-slot img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ---------- hover card: domain -> title -> year -> url 순서로 떠오름 ---------- */

  .hover-card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: .25rem;
    padding: .6rem .7rem .7rem;
    background: linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.45) 55%, rgba(0,0,0,0) 100%);
    opacity: 0;
    transition: opacity .18s ease;
    pointer-events: none;
  }
  .obj-slot:hover .hover-card,
  .obj-slot:focus-within .hover-card {
    opacity: 1;
    pointer-events: auto;
  }

  .hover-card > * {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .18s ease, transform .18s ease;
  }
  .obj-slot:hover .hover-card > *,
  .obj-slot:focus-within .hover-card > * {
    opacity: 1;
    transform: translateY(0);
  }
  .hover-card .hc-domain { transition-delay: 0ms; }
  .hover-card .hc-title  { transition-delay: 50ms; }
  .hover-card .hc-year   { transition-delay: 100ms; }
  .hover-card .hc-url    { transition-delay: 150ms; }

  .hc-domain {
    align-self: flex-start;
    font-family: var(--font-label);
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #fff;
    padding: .18em .5em;
  }
  .hc-domain.movie { background: var(--tag-movie); }
  .hc-domain.music { background: var(--tag-music); }
  .hc-domain.book  { background: var(--tag-book); }

  .hc-title {
    font-family: var(--font-label);
    font-weight: 700;
    font-size: .82rem;
    line-height: 1.25;
    color: #fff;
  }
  .hc-year {
    font-family: var(--font-label);
    font-size: .72rem;
    color: rgba(255,255,255,.75);
    font-variant-numeric: tabular-nums;
  }
  .hc-url {
    font-family: var(--font-label);
    font-size: .72rem;
    font-weight: 700;
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 2px;
    width: fit-content;
  }
  .hc-url:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 2px;
  }

  .bottom-line {
    font-weight: 800;
    font-size: clamp(2.4rem, 8vw, 4rem);
    text-align: center;
    margin: clamp(2.5rem, 6vw, 4rem) 0 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .hover-card, .hover-card > * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <h1 class="headline">이게 당신의 Vibe라면</h1>
  <span class="script-sub">이번 추천에서</span>

  <div class="canvas" id="canvas"></div>

  <p class="bottom-line">인정</p>
</div>

<script src="data.js"></script>
<script>
  // 8존 고정 배치. 존별 뒤에 겹쳐지는 페어는 두 슬롯을 인접 좌표로 배치해 표현.
  const SLOTS = [
    { left: 2,  top: 8,  width: 19, rot: -8, z: 1 },
    { left: 14, top: 4,  width: 19, rot: 7,  z: 2 },
    { left: 35, top: 6,  width: 30, rot: 0,  z: 3 },
    { left: 70, top: 8,  width: 27, rot: 2,  z: 2 },
    { left: 2,  top: 40, width: 15, rot: -6, z: 1 },
    { left: 12, top: 44, width: 15, rot: 5,  z: 2 },
    { left: 74, top: 42, width: 20, rot: -3, z: 2 },
    { left: 3,  top: 62, width: 17, rot: -5, z: 1 },
    { left: 14, top: 66, width: 17, rot: 6,  z: 2 },
    { left: 36, top: 62, width: 16, rot: -4, z: 1 },
    { left: 50, top: 60, width: 16, rot: 5,  z: 2 },
    { left: 74, top: 66, width: 22, rot: -3, z: 2 },
  ];

  const DOMAIN_LABEL = { movie: "Movie", music: "Music", book: "Book" };

  function renderItem(item, slot) {
    const fig = document.createElement("figure");
    fig.className = "obj-slot";
    fig.style.left = slot.left + "%";
    fig.style.top = slot.top + "%";
    fig.style.width = slot.width + "%";
    fig.style.setProperty("--rot", slot.rot + "deg");
    fig.style.zIndex = slot.z;

    const yearText = item.year || "xxxx";

    fig.innerHTML = `
      <div class="frame">
        <img src="${item.image}" alt="${item.title}" loading="lazy" />
        <div class="hover-card">
          <span class="hc-domain ${item.domain}">${DOMAIN_LABEL[item.domain] || item.domain}</span>
          <span class="hc-title">${item.title}</span>
          <span class="hc-year">${yearText}</span>
          <a class="hc-url" href="${item.url}" target="_blank" rel="noopener">바로가기 ↗</a>
        </div>
      </div>
    `;
    return fig;
  }

  const canvas = document.getElementById("canvas");
  const items = window.RECOMMENDATIONS || [];
  items.slice(0, SLOTS.length).forEach((item, i) => {
    canvas.appendChild(renderItem(item, SLOTS[i % SLOTS.length]));
  });
</script>
</body>
</html>
